<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NSE Text Screener</title>
<style>
  :root{
    --bg:#0B1017; --panel:#111826; --panel2:#0E1420; --line:#1E2836;
    --text:#D7DEE8; --muted:#7C8798; --amber:#E8A33D; --amber-dim:#8A6524;
    --pass:#3FBF9F; --fail:#E06060; --mono:"IBM Plex Mono","JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.55}
  .wrap{max-width:1060px;margin:0 auto;padding:28px 20px 80px}

  /* header */
  header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:26px;flex-wrap:wrap;gap:8px}
  h1{font-size:17px;font-weight:600;letter-spacing:.04em}
  h1 .tick{color:var(--amber)}
  .status{font-family:var(--sans);font-size:11.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .status b{color:var(--text);font-weight:600}
  .badge{display:inline-block;padding:1px 8px;border:1px solid var(--amber-dim);color:var(--amber);border-radius:3px;margin-left:8px}

  /* eyebrow labels */
  .eyebrow{font-family:var(--sans);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}

  /* query area */
  .tabs{display:flex;gap:0;margin-bottom:-1px}
  .tab{font-family:var(--sans);font-size:12px;letter-spacing:.05em;padding:7px 16px;border:1px solid var(--line);border-bottom:none;background:var(--panel2);color:var(--muted);cursor:pointer;border-radius:4px 4px 0 0}
  .tab.active{background:var(--panel);color:var(--text);border-color:var(--line)}
  .qbox{background:var(--panel);border:1px solid var(--line);border-radius:0 4px 4px 4px;padding:16px}
  textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:14px;padding:12px;resize:vertical;min-height:64px}
  textarea:focus{outline:2px solid var(--amber-dim);outline-offset:1px}
  .row{display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap}
  button{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.03em;padding:9px 20px;border-radius:4px;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);cursor:pointer}
  button.primary{background:var(--amber);color:#161006;border-color:var(--amber)}
  button:hover{filter:brightness(1.12)}
  button:disabled{opacity:.4;cursor:default}
  button:focus-visible{outline:2px solid var(--pass);outline-offset:2px}
  select{background:var(--bg);border:1px solid var(--line);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:12.5px;padding:7px 10px;min-width:280px;max-width:100%}
  select:focus{outline:2px solid var(--amber-dim)}
  .asof{font-family:var(--sans);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .asof input{background:var(--bg);border:1px solid var(--line);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:12.5px;padding:6px 8px;color-scheme:dark}
  .spark{margin-top:14px;background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:8px 10px 4px}
  .spark svg{display:block;width:100%;height:120px}
  .sleg{font-family:var(--sans);font-size:10.5px;color:var(--muted);letter-spacing:.05em;margin-top:2px}
  .sleg span{margin-right:12px}
  .pdesc{font-family:var(--sans);font-size:12px;color:var(--muted);margin-top:8px;display:none;border-left:2px solid var(--line);padding-left:10px}

  /* interpretation */
  .interp{margin-top:22px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:4px;padding:16px 18px;display:none}
  .interp .english{font-size:14.5px}
  details{margin-top:10px}
  summary{font-family:var(--sans);font-size:11.5px;color:var(--muted);cursor:pointer;letter-spacing:.05em}
  pre{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:12px;overflow-x:auto;font-size:12.5px;margin-top:8px;color:#A8C6A0}

  /* stats strip */
  .stats{display:none;margin-top:26px;border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .stats .cells{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
  .cell{padding:12px 16px;border-right:1px solid var(--line);background:var(--panel2)}
  .cell:last-child{border-right:none}
  .cell .k{font-family:var(--sans);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .cell .v{font-size:19px;margin-top:2px}
  .cell .v.hl{color:var(--amber)}

  /* results — the evidence ledger */
  .results{margin-top:26px}
  .match{border:1px solid var(--line);border-radius:4px;margin-bottom:12px;background:var(--panel);overflow:hidden}
  .mhead{display:flex;align-items:baseline;gap:14px;padding:13px 16px;cursor:pointer;flex-wrap:wrap}
  .mhead:hover{background:var(--panel2)}
  .sym{font-size:16px;font-weight:700;color:var(--amber);min-width:88px}
  .cname{font-family:var(--sans);font-size:12.5px;color:var(--muted);flex:1;min-width:160px}
  .mini{font-size:12.5px;color:var(--muted)}
  .mini b{color:var(--text);font-weight:500}
  .pos{color:var(--pass)} .neg{color:var(--fail)}
  .mbody{display:none;border-top:1px solid var(--line);padding:14px 16px 16px}
  .match.open .mbody{display:block}
  .ledger{margin-top:4px}
  .cond{display:grid;grid-template-columns:22px 1fr;gap:0 10px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .cond:last-child{border-bottom:none}
  .mark{font-weight:700}
  .mark.ok{color:var(--pass)} .mark.no{color:var(--fail)}
  .cdesc{font-family:var(--sans);font-size:12.5px;color:var(--text)}
  .cev{grid-column:2;font-size:12.5px;color:var(--muted);margin-top:2px}
  .cev .num{color:#C9D6E4}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:14px}
  .m{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:8px 10px}
  .m .k{font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .m .v{font-size:14px;margin-top:1px}

  .sechead{font-family:var(--sans);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:30px 0 12px;border-bottom:1px solid var(--line);padding-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .sechead .toggle{font-family:var(--sans);font-size:11px;padding:3px 10px;border:1px solid var(--line);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;text-transform:none;letter-spacing:.02em}
  .sechead .toggle:hover{color:var(--text);border-color:var(--amber-dim)}
  .capnote{font-family:var(--sans);font-size:11.5px;color:var(--muted);margin:-6px 0 12px}
  .nearmiss .sym{color:var(--muted)}
  .recent-row{display:flex;gap:12px;align-items:baseline;padding:8px 10px;border:1px solid var(--line);border-radius:4px;margin-bottom:6px;cursor:pointer;background:var(--panel2);flex-wrap:wrap}
  .recent-row:hover{border-color:var(--amber-dim)}
  .recent-row .cname{font-size:12px}
  .btnsm{font-size:11px;padding:4px 12px}
  .foot{margin-top:36px;border-top:1px solid var(--line);padding-top:14px;font-family:var(--sans);font-size:12px;color:var(--muted);line-height:1.7}
  .err{display:none;margin-top:14px;border:1px solid var(--fail);border-radius:4px;background:#1A0F10;color:#F0A8A8;padding:12px 14px;font-family:var(--sans);font-size:13px}
  .spin{display:none;color:var(--amber);margin-left:6px}
  @media (prefers-reduced-motion:no-preference){.spin.on{display:inline;animation:b 1s steps(4) infinite}}
  @keyframes b{0%{content:""}}
  .empty{padding:26px;text-align:center;color:var(--muted);font-family:var(--sans);border:1px dashed var(--line);border-radius:4px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="tick">▮</span> NSE TEXT SCREENER</h1>
    <div class="status" id="status">connecting…</div>
  </header>

  <div class="eyebrow">Define the screen</div>
  <div class="tabs">
    <button class="tab active" id="tabEn" onclick="setTab('en')">Plain English</button>
    <button class="tab" id="tabJs" onclick="setTab('js')">JSON spec</button>
  </div>
  <div class="qbox">
    <textarea id="qEn" placeholder="e.g. stocks taking support at 50 EMA and in an uptrend"></textarea>
    <textarea id="qJs" style="display:none" placeholder='{"logic":"AND","conditions":[...]}'></textarea>
    <div class="row">
      <button class="primary" id="btnInterpret" onclick="interpret()">Interpret query</button>
      <button id="btnRun" onclick="run()" disabled>Run screen</button>
      <label class="asof">as of <input type="date" id="asOf" title="screen a historical date (blank = latest bar)"></label>
      <span class="spin" id="spin">▮▮▮</span>
    </div>
    <div class="row" style="margin-top:14px">
      <label class="eyebrow" for="presetSel" style="margin:0">Preset screens</label>
      <select id="presetSel" onchange="pickPreset()">
        <option value="">— choose a pre-configured screen —</option>
      </select>
      <button class="btnsm" id="btnRecent" onclick="toggleRecent()" type="button">recent screens</button>
    </div>
    <div class="pdesc" id="pdesc"></div>
    <div id="recentPanel" style="display:none;margin-top:12px"></div>
  </div>

  <div class="err" id="err"></div>

  <div class="interp" id="interp">
    <div class="eyebrow">Compiled interpretation — verify before trusting results</div>
    <div class="english" id="english"></div>
    <details><summary>show compiled filter spec (JSON)</summary><pre id="specPre"></pre></details>
  </div>

  <div class="stats" id="stats">
    <div class="cells" id="cells"></div>
    <div style="padding:10px 16px;border-top:1px solid var(--line)">
      <button class="btnsm" id="btnExport" onclick="exportCsv()" type="button">export matches to CSV</button>
    </div>
  </div>

  <div class="results" id="results"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
let PRESETS = [];   // loaded from /api/presets
let tab="en", spec=null;

function pickPreset(){
  const id = $("presetSel").value;
  const p = PRESETS.find(x=>x.id===id);
  const d = $("pdesc");
  if(!p){d.style.display="none";return}
  setTab("js");
  $("qJs").value = JSON.stringify(p.spec, null, 2);
  spec = null;
  $("interp").style.display="none";
  $("btnRun").disabled = false;
  d.innerHTML = `<b style="color:var(--text)">${p.name}.</b> ${p.description}<br>Compiles to: ${p.english}`;
  d.style.display = "block";
}

let RECENT_LOADED=false, RECENT_LOG=[];
async function toggleRecent(){
  const p=$("recentPanel"), opening = p.style.display==="none";
  p.style.display = opening?"block":"none";
  $("btnRecent").textContent = opening?"hide recent":"recent screens";
  if(!opening || RECENT_LOADED) return;
  p.innerHTML=`<div class="pdesc" style="display:block">loading…</div>`;
  try{
    RECENT_LOG = await api("/api/log");
    RECENT_LOADED=true;
    p.innerHTML = RECENT_LOG.length
      ? RECENT_LOG.map((e,i)=>`
        <div class="recent-row" onclick="replayRecent(${i})">
          <span class="mini">${(e.ts||"").replace("T"," ").slice(0,16)}</span>
          <span class="mini">as_of <b>${e.as_of}</b></span>
          <span class="mini"><b>${e.stats.matched}</b>/${e.stats.evaluated}</span>
          <span class="cname">${e.english||JSON.stringify(e.spec)}</span>
        </div>`).join("")
      : `<div class="pdesc" style="display:block">No screens logged yet — run one first.</div>`;
  }catch(e){
    p.innerHTML=`<div class="pdesc" style="display:block">Could not load recent screens: ${e.message}</div>`;
  }
}
function replayRecent(i){
  const e=RECENT_LOG[i];
  setTab("js");
  $("qJs").value=JSON.stringify(e.spec,null,2);
  spec=null; $("interp").style.display="none";
  $("btnRun").disabled=false;
  $("asOf").value = (e.as_of && e.as_of!=="latest") ? e.as_of : "";
  $("pdesc").innerHTML=`<b style="color:var(--text)">Replaying logged screen.</b> ${e.english||""}`;
  $("pdesc").style.display="block";
  toggleRecent();
  window.scrollTo({top:0,behavior:"smooth"});
}

function $(id){return document.getElementById(id)}
function setTab(t){tab=t;
  $("tabEn").classList.toggle("active",t==="en");
  $("tabJs").classList.toggle("active",t==="js");
  $("qEn").style.display=t==="en"?"":"none";
  $("qJs").style.display=t==="js"?"":"none";
  $("btnInterpret").style.display=t==="en"?"":"none";
  $("btnRun").disabled = t==="en" && !spec;
}
function err(msg){const e=$("err");e.textContent=msg;e.style.display=msg?"block":"none"}
function busy(b){$("spin").classList.toggle("on",b);
  $("btnInterpret").disabled=b;$("btnRun").disabled=b||(tab==="en"&&!spec)}

async function api(path, body){
  const r = await fetch(path,{method:body?"POST":"GET",
    headers:{"Content-Type":"application/json"},
    body:body?JSON.stringify(body):undefined});
  const j = await r.json();
  if(!r.ok) throw new Error(j.error||("HTTP "+r.status));
  return j;
}

async function init(){
  try{
    PRESETS = await api("/api/presets");
    const sel = $("presetSel"), groups = {};
    PRESETS.forEach(p=>{(groups[p.group]=groups[p.group]||[]).push(p)});
    for(const [g,items] of Object.entries(groups)){
      const og=document.createElement("optgroup");og.label=g;
      items.forEach(p=>{const o=document.createElement("option");
        o.value=p.id;o.textContent=p.name;og.appendChild(o)});
      sel.appendChild(og);
    }
  }catch(e){/* presets unavailable — dropdown stays empty */}
  try{
    const s=await api("/api/status");
    $("status").innerHTML=`data as of <b>${s.as_of}</b> · <b>${s.universe_size}</b> symbols · ${s.history_years}y daily`+
      (s.mode==="demo"?`<span class="badge">DEMO DATA</span>`:``);
  }catch(e){$("status").textContent="backend unreachable";}
}

async function interpret(){
  err("");spec=null;$("interp").style.display="none";
  const q=$("qEn").value.trim();
  if(!q){err("Enter a screen description first.");return}
  busy(true);
  try{
    const r=await api("/api/parse",{query:q});
    spec=r.spec;
    $("english").textContent=r.english;
    $("specPre").textContent=JSON.stringify(r.spec,null,2);
    $("interp").style.display="block";
    $("btnRun").disabled=false;
  }catch(e){err(e.message)}
  busy(false);
}

async function run(){
  err("");
  let s=spec;
  if(tab==="js"){
    try{s=JSON.parse($("qJs").value)}catch(e){err("Spec is not valid JSON: "+e.message);return}
  }
  if(!s){err("Interpret the query first.");return}
  const d = $("asOf").value;
  s = {...s, as_of: d || "latest"};
  busy(true);
  try{ render(await api("/api/screen",{spec:s})) }catch(e){err(e.message)}
  busy(false);
}

const SCOL=["#5B9BD5","#B07CC6","#6FBF9F","#D5A15B"]; // overlay palette
function spark(m){
  const s=m.spark; if(!s||!s.close||s.close.length<2) return "";
  const W=680,H=110,P=6;
  let vals=[...s.low,...s.high];
  Object.values(s.series).forEach(a=>vals=vals.concat(a.filter(v=>v!==null)));
  Object.values(s.levels).forEach(v=>vals.push(v));
  vals=vals.filter(v=>v!==null&&isFinite(v));
  const mn=Math.min(...vals),mx=Math.max(...vals),sp=(mx-mn)||1;
  const X=i=>P+(W-2*P)*i/(s.close.length-1);
  const Y=v=>H-P-(H-2*P)*(v-mn)/sp;
  const path=a=>a.map((v,i)=>v===null?"":`${i&&a[i-1]!==null?"L":"M"}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join("");
  let svg=`<path d="${path(s.close)}" fill="none" stroke="var(--amber)" stroke-width="1.6"/>`;
  let leg=`<span style="color:var(--amber)">— close</span>`;
  Object.entries(s.series).forEach(([k,a],n)=>{
    svg+=`<path d="${path(a)}" fill="none" stroke="${SCOL[n%4]}" stroke-width="1.1" opacity=".9"/>`;
    leg+=`<span style="color:${SCOL[n%4]}">— ${k.replace("_"," ").toUpperCase()}</span>`;});
  Object.entries(s.levels).forEach(([k,v])=>{
    svg+=`<line x1="${P}" x2="${W-P}" y1="${Y(v).toFixed(1)}" y2="${Y(v).toFixed(1)}" stroke="var(--muted)" stroke-dasharray="4 4" stroke-width="1"/>`;
    leg+=`<span>┄ ${k} ${v}</span>`;});
  return `<div class="spark"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="price chart">${svg}</svg>
    <div class="sleg">${leg}<span style="float:right">${s.dates[0]} → ${s.dates[s.dates.length-1]}</span></div></div>`;
}
const fmt=(v,suf="")=>v===null||v===undefined?"—":v+suf;
const signed=v=>v===null||v===undefined?"—":
  `<span class="${v>=0?"pos":"neg"}">${v>0?"+":""}${v}%</span>`;

let LAST_MATCHES=[], NEARMISS_SHOWN=true;
function csvEscape(v){
  const s=v===null||v===undefined?"":String(v);
  return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;
}
function exportCsv(){
  if(!LAST_MATCHES.length){err("No matches to export.");return}
  const cols=["symbol","name","industry","close","pct_vs_ema50","rsi","adx",
    "vol_ratio","atr_pct","ret_1m_pct","ret_3m_pct","pct_from_52w_high",
    "turnover_cr","conditions_passed","conditions_total"];
  const rows=[cols.join(",")];
  LAST_MATCHES.forEach(m=>{
    const row=cols.map(c=>{
      if(c in m) return csvEscape(m[c]);
      return csvEscape(m.metrics?.[c]);
    });
    rows.push(row.join(","));
  });
  const blob=new Blob([rows.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`screen_matches_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function toggleNearMiss(){
  NEARMISS_SHOWN=!NEARMISS_SHOWN;
  const box=$("nearMissBox");
  if(box) box.style.display=NEARMISS_SHOWN?"":"none";
  const btn=$("btnNearMiss");
  if(btn) btn.textContent=NEARMISS_SHOWN?"hide":"show";
}

function render(r){
  // interpretation always shown with results — the audit header
  $("english").textContent=r.english;
  $("specPre").textContent=JSON.stringify(r.spec,null,2);
  $("interp").style.display="block";
  LAST_MATCHES=r.matches;
  RECENT_LOADED=false; // this run just appended to the log — refetch next open

  const st=r.stats, cells=[
    ["Universe",st.universe],["Liquidity-excluded",st.liquidity_excluded],
    ["Evaluated",st.evaluated],["Matched",st.matched,true],
    ["Near misses",st.near_misses],["As of",r.as_of]];
  $("cells").innerHTML=cells.map(([k,v,hl])=>
    `<div class="cell"><div class="k">${k}</div><div class="v ${hl?"hl":""}">${v}</div></div>`).join("");
  $("stats").style.display="block";

  const card=(m,miss)=>`
    <div class="match ${miss?"nearmiss":""}" onclick="this.classList.toggle('open')">
      <div class="mhead">
        <span class="sym">${m.symbol}</span>
        <span class="cname">${m.name} · ${m.industry}</span>
        <span class="mini">₹<b>${fmt(m.metrics.close)}</b></span>
        <span class="mini">3M ${signed(m.metrics.ret_3m_pct)}</span>
        <span class="mini">RSI <b>${fmt(m.metrics.rsi)}</b></span>
        <span class="mini"><b class="${miss?"neg":"pos"}">${m.conditions_passed}/${m.conditions_total}</b> conditions</span>
      </div>
      <div class="mbody">
        ${spark(m)}
        <div class="eyebrow">Evidence — why this ${miss?"almost matched":"matched"}</div>
        <div class="ledger">
          ${m.evidence.map(e=>`
            <div class="cond">
              <span class="mark ${e.passed?"ok":"no"}">${e.passed?"✓":"✗"}</span>
              <span class="cdesc">${e.description}</span>
              <span class="cev">observed: <span class="num">${e.evidence}</span></span>
            </div>`).join("")}
        </div>
        <div class="eyebrow" style="margin-top:16px">Snapshot metrics (latest bar)</div>
        <div class="mgrid">
          ${[["Close ₹",m.metrics.close],["vs EMA50 %",m.metrics.pct_vs_ema50],
             ["RSI(14)",m.metrics.rsi],["ADX(14)",m.metrics.adx],
             ["Vol ratio ×",m.metrics.vol_ratio],["ATR %",m.metrics.atr_pct],
             ["1M ret %",m.metrics.ret_1m_pct],["3M ret %",m.metrics.ret_3m_pct],
             ["vs 52w high %",m.metrics.pct_from_52w_high],
             ["Med turnover ₹cr",m.metrics.turnover_cr]]
            .map(([k,v])=>`<div class="m"><div class="k">${k}</div><div class="v">${fmt(v)}</div></div>`).join("")}
        </div>
      </div>
    </div>`;

  let html="";
  html+=`<div class="sechead">Matches (${r.matches.length}) — click any row for the full evidence trail</div>`;
  if(r.stats.matched>r.matches.length){
    html+=`<div class="capnote">Showing the top ${r.matches.length} of ${r.stats.matched} matches (sorted by 3-month return) — refine the screen for a tighter list, or export CSV for the full displayed set.</div>`;
  }
  html+= r.matches.length? r.matches.map(m=>card(m,false)).join("")
       : `<div class="empty">No stocks matched every condition. The near-misses below failed exactly one — loosen that condition if they look right.</div>`;
  if(r.near_misses.length){
    NEARMISS_SHOWN=true;
    html+=`<div class="sechead">Near misses — failed exactly one condition
      <button class="toggle" id="btnNearMiss" onclick="toggleNearMiss()" type="button">hide</button></div>`;
    html+=`<div id="nearMissBox">${r.near_misses.map(m=>card(m,true)).join("")}</div>`;
  }
  $("results").innerHTML=html;

  $("foot").innerHTML=`<b style="color:var(--text)">Methodology.</b> ${r.methodology.data}. Liquidity gate: ${r.methodology.liquidity_gate}. Missing-data policy: ${r.methodology.nan_policy}. Every screen is fully determined by the compiled spec above plus the as-of date — rerun with the same spec on the same data and you get the same result. Definitions of every condition: TECHNICAL_DESIGN.md.`;
  window.scrollTo({top:$("stats").offsetTop-16,behavior:"smooth"});
}
init();
</script>
</body>
</html>
