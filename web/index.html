<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NSE Text Screener</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="tick">▮</span> NSE TEXT SCREENER</h1>
    <select id="universeSel" style="display:none;min-width:0" onchange="switchUniverse()" title="active screening universe" aria-label="active screening universe"></select>
    <div class="status" id="status">connecting…</div>
  </header>

  <div class="eyebrow">Define the screen</div>
  <div class="tabs">
    <button class="tab active" id="tabEn" onclick="setTab('en')">Plain English</button>
    <button class="tab" id="tabJs" onclick="setTab('js')">JSON spec</button>
  </div>
  <div class="qbox">
    <textarea id="qEn" placeholder="e.g. stocks taking support at 50 EMA and in an uptrend"></textarea>
    <textarea id="qJs" style="display:none" placeholder='{"logic":"AND","conditions":[...]}'></textarea>
    <div class="row">
      <button class="primary" id="btnInterpret" onclick="interpret()">Interpret query</button>
      <button id="btnRun" onclick="run()" disabled>Run screen</button>
      <label class="asof">as of <input type="date" id="asOf" title="screen a historical date (blank = latest bar)"></label>
      <span class="spin" id="spin">▮▮▮</span>
    </div>
    <div class="row" style="margin-top:14px">
      <label class="eyebrow" for="presetSel" style="margin:0">Preset screens</label>
      <select id="presetSel" onchange="pickPreset()">
        <option value="">— choose a pre-configured screen —</option>
      </select>
      <button class="btnsm" id="btnRecent" onclick="toggleRecent()" type="button">recent screens</button>
      <button class="btnsm" id="btnWatchlist" onclick="toggleWatchlist()" type="button">☆ watchlist</button>
      <button class="btnsm" onclick="saveCurrentAsPreset()" type="button">💾 save as my screen</button>
      <button class="btnsm" id="btnMyScreens" onclick="toggleMyScreens()" type="button">manage my screens</button>
      <button class="btnsm" id="btnDashboard" onclick="toggleDashboard()" type="button">📊 dashboard</button>
    </div>
    <div class="pdesc" id="pdesc"></div>
    <div id="recentPanel" style="display:none;margin-top:12px"></div>
    <div id="myScreensPanel" style="display:none;margin-top:12px"></div>
    <div id="dashboardPanel" style="display:none;margin-top:12px"></div>
    <div id="watchlistPanel" style="display:none;margin-top:12px"></div>
  </div>

  <div class="err" id="err"></div>

  <div class="interp" id="interp">
    <div class="eyebrow">Compiled interpretation — verify before trusting results</div>
    <div class="english" id="english"></div>
    <div class="pdesc" id="assumptions" style="margin-top:8px"></div>
    <div class="evcaveat" id="screenWarnings" style="display:none;margin-top:8px"></div>
    <details><summary>show compiled filter spec (JSON)</summary><pre id="specPre"></pre></details>
  </div>

  <div class="stats" id="stats">
    <div class="cells" id="cells"></div>
    <div style="padding:10px 16px;border-top:1px solid var(--line)">
      <button class="btnsm" id="btnExport" onclick="exportCsv()" type="button">export matches to CSV</button>
      <button class="btnsm" id="btnAllocate" onclick="toggleAllocate()" type="button">💰 allocate</button>
      <button class="btnsm" id="btnBacktest" onclick="toggleBacktest()" type="button">🧪 backtest</button>
      <button class="btnsm" onclick="window.print()" type="button">🖨 print report</button>
    </div>
    <div id="diffBox" style="display:none;padding:10px 16px;border-top:1px solid var(--line)"></div>
    <div id="allocatePanel" style="display:none;padding:10px 16px;border-top:1px solid var(--line)"></div>
    <div id="backtestPanel" style="display:none;padding:10px 16px;border-top:1px solid var(--line)"></div>
  </div>

  <div class="results" id="results"></div>
  <div class="foot" id="foot"></div>
</div>

<div class="modalOverlay" id="chartModal" onclick="if(event.target===this) closeChartModal()">
  <div class="modalBox" role="dialog" aria-modal="true" aria-labelledby="chartModalTitle">
    <div class="modalHead">
      <span id="chartModalTitle"></span>
      <button class="btnsm" id="chartModalClose" onclick="closeChartModal()" type="button">close ✕</button>
    </div>
    <div id="chartModalBody"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
