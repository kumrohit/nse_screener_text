name: tests
on:
  push:
  pull_request:
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v
        # Offline suite only: synthetic-data evaluator tests + golden fixture
        # validation. The live parser harness (tests/golden_harness.py) needs
        # ANTHROPIC_API_KEY and is run manually before parser-prompt changes.
